<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Diese Seite wurde nicht gefunden. Kehren Sie zur Startseite von business-kreativ zurück oder starten Sie die Potenzialanalyse.">
<title>404 — business-kreativ</title>
<link rel="icon" type="image/png" href="/assets/logo_bk-icon.png?v=20260526">
<link rel="apple-touch-icon" href="/assets/logo_bk-icon.png?v=20260526">
<link rel="stylesheet" href="assets/fonts/fonts.css?v=20260526">
<script src="i18n/translations.js?v=i18n-20260526"></script>
<script src="i18n/i18n.js?v=i18n-20260525"></script>
<script src="i18n/cookie-consent.js?v=cookie-20260526"></script>
<style>
  :root {
    --bg: #FAF8F6;
    --ink: #000;
    --muted: #6b6b6b;
    --line: #E5E2DD;
    --accent: #F7934A;
    --dark: #0e1116;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 80% 15%, rgba(247,147,74,0.14), transparent 34%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: min(100%, 620px);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: clamp(32px, 6vw, 56px);
    text-align: center;
    box-shadow: 0 24px 70px -34px rgba(0,0,0,0.35);
  }
  .logo {
    width: 58px;
    height: 58px;
    margin: 0 auto 28px;
    border-radius: 14px;
    background: var(--dark);
    display: grid;
    place-items: center;
    padding: 7px;
  }
  .logo img { width: 100%; height: 100%; object-fit: contain; }
  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    margin: 0;
    font-size: clamp(34px, 7vw, 58px);
    line-height: 1.04;
    letter-spacing: -0.04em;
  }
  p {
    margin: 18px auto 0;
    max-width: 440px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.65;
  }
  .actions {
    margin-top: 32px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .btn-primary {
    background: linear-gradient(135deg, #7C4A25 0%, #762E5C 100%);
    color: #fff;
  }
  .btn-ghost {
    border: 1px solid var(--line);
    color: var(--muted);
  }
  @media (max-width: 520px) {
    body { padding: 18px; }
    .actions { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
  <main class="card">
    <a class="logo" href="index.html" aria-label="business-kreativ">
      <img src="assets/logo_bk-small.webp" alt="bk" width="180" height="180" />
    </a>
    <div class="eyebrow">404</div>
    <h1>Diese Seite gibt es nicht.</h1>
    <p>Der Link ist veraltet oder die Adresse wurde falsch eingegeben. Zurück zur Startseite oder direkt zur Potenzialanalyse.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Zur Startseite</a>
      <a class="btn btn-ghost" href="/prozess-check">Potenzialanalyse starten</a>
    </div>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" type="image/png" href="/assets/logo_bk.png?v=20260525">
<link rel="apple-touch-icon" href="/assets/logo_bk.png?v=20260525">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --bg: #FAF8F6;
    --surface: #ffffff;
    --ink: #000000;
    --ink-2: #1A1A1A;
    --muted: #6b6b6b;
    --line: #E5E2DD;
    --line-2: #EEEAE4;
    --accent: #F7934A;
    --accent-2: #EC5BB8;
    --accent-soft: rgba(247,147,74,0.12);
    --dark: #000000;
    --dark-2: #0A0A0A;
    --ok: #1f8a4c;
    --bad: #c4453a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-feature-settings: 'ss01', 'cv11';
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  #root { min-height: 100vh; }
  img, svg { max-width: 100%; }

  body.home-logo-header #root > section:first-of-type::before {
    content: "";
    position: absolute;
    top: 50%;
    right: clamp(-260px, -11vw, -120px);
    width: min(1170px, calc(96vw - 10px));
    aspect-ratio: 1;
    background: url("assets/logo_bk.png") center / contain no-repeat;
    opacity: 0.07;
    filter: saturate(0.7) brightness(0.85);
    mix-blend-mode: normal;
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 0;
  }
  body.home-logo-header #root > section:first-of-type {
    background: #0c0f13 !important;
  }
  body.home-logo-header #root > section:first-of-type > * {
    position: relative;
    z-index: 1;
  }

  /* Hide mobile-only labels by default */
  .lp-mobile-label { display: none; }

  /* ============ RESPONSIVE UTILITY OVERRIDES ============ */
  /* These target inline-style grids by class. Use !important to win over inline styles. */

  /* === Tablet & below (≤ 1024px) === */
  @media (max-width: 1024px) {
    .lp-section { padding-left: 24px !important; padding-right: 24px !important; padding-top: 72px !important; padding-bottom: 72px !important; }
    .lp-hero-grid { grid-template-columns: 1fr !important; gap: 40px !important; padding: 56px 24px 64px !important; }
    .lp-2col-md { grid-template-columns: 1fr !important; gap: 32px !important; }
    .lp-4col-md { grid-template-columns: repeat(2, 1fr) !important; }
    .lp-6col-md { grid-template-columns: repeat(2, 1fr) !important; }
    .lp-services-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .lp-service-card { grid-column: span 1 !important; }
    .lp-3col-md { grid-template-columns: 1fr 1fr !important; }
    .lp-nav-links { display: none !important; }
    .lp-nav-inner { padding: 10px 20px !important; }
    .lp-logos-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 16px !important; row-gap: 18px !important; }
    /* hide decorative hero orbit/numbers on tablet & below to prevent overflow */
    .lp-hero-orbit, .lp-hero-decor { display: none !important; }
    .lp-section-bignum {
      display: block !important;
      font-size: 180px !important;
      top: 36px !important;
      opacity: 0.85;
    }
    body.home-logo-header #root > section:first-of-type::before {
      top: 50%;
      right: -240px;
      width: 890px;
      opacity: 0.14;
    }
  }

  /* === Mobile (≤ 720px) === */
  @media (max-width: 720px) {
    html, body { overflow-x: hidden; }

    /* ===== Global section rhythm ===== */
    .lp-section { padding-left: 20px !important; padding-right: 20px !important; padding-top: 72px !important; padding-bottom: 72px !important; }
    .lp-section-h2 { font-size: 36px !important; line-height: 1.04 !important; letter-spacing: -0.025em !important; font-weight: 700 !important; }
    .lp-section-sub { font-size: 15px !important; }
    .lp-section-bignum { font-size: 132px !important; top: 28px !important; opacity: 0.65; }

    /* ===== Hero ===== */
    .lp-hero-grid { padding: 32px 20px 64px !important; gap: 32px !important; }
    .lp-hero-h1 { font-size: 44px !important; line-height: 1.02 !important; letter-spacing: -0.03em !important; font-weight: 700 !important; }
    .lp-hero-sub { font-size: 16px !important; line-height: 1.55 !important; color: rgba(255,255,255,0.78) !important; }
    .lp-hero-cta-row { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; margin-top: 4px !important; }
    .lp-hero-cta-row > a { width: 100% !important; justify-content: center !important; min-height: 54px; padding: 6px 8px 6px 22px !important; border-radius: 12px !important; }
    .lp-hero-cta-row > a:last-child { padding: 16px 18px !important; justify-content: center !important; border: 1px solid rgba(255,255,255,0.18); border-radius: 12px !important; }
    .lp-trust-line {
      gap: 10px !important;
      flex-direction: column !important;
      align-items: flex-start !important;
      font-size: 13px !important;
      margin-top: 32px !important;
      padding-top: 22px !important;
    }
    body.home-logo-header #root > section:first-of-type::before {
      top: 48%;
      right: -300px;
      width: 610px;
      opacity: 0.11;
    }

    /* ===== Hero visual (kompakt aber lesbar) ===== */
    .lp-hero-visual { padding: 16px 14px !important; border-radius: 14px !important; }
    .lp-hero-visual-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
    .lp-hero-header-bar { display: none !important; }
    /* Section labels als kleine Pill-Badges mit Punkt */
    .lp-mobile-label {
      position: static !important;
      display: inline-flex !important;
      align-items: center !important;
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: rgba(255,255,255,0.7) !important;
      padding: 5px 12px !important;
      border-radius: 100px !important;
      font-size: 11px !important;
      letter-spacing: 0.04em !important;
      margin-bottom: 10px !important;
      top: auto !important;
      left: auto !important;
    }
    .lp-mobile-label::before {
      content: "";
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .lp-mobile-label-before::before { background: var(--bad); }
    .lp-mobile-label-after::before { background: var(--ok); }
    /* Pfeil als duenne horizontale Trennlinie mit kleinem Symbol */
    .lp-hero-visual-arrow {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
      transform: none !important;
      margin: 2px 0 !important;
      padding: 0 !important;
    }
    .lp-hero-visual-arrow::before,
    .lp-hero-visual-arrow::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .lp-hero-visual-arrow > div {
      width: 28px !important;
      height: 28px !important;
      box-shadow: 0 0 0 5px rgba(255,122,26,0.1) !important;
    }
    .lp-hero-visual-arrow > div svg { width: 13px !important; height: 13px !important; }
    /* Chaos: 6 Chips in 3x2 */
    .lp-hero-chaos { height: auto !important; padding-top: 0 !important; overflow: visible !important; text-align: center !important; }
    .lp-chaos-desktop { display: none !important; }
    .lp-chaos-mobile {
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      gap: 6px !important;
    }
    .lp-chaos-mobile > * {
      padding: 6px 10px !important;
      font-size: 12px !important;
      gap: 6px !important;
      justify-content: center;
      border-radius: 100px !important;
    }
    .lp-chaos-mobile > * svg { width: 12px !important; height: 12px !important; }
    .lp-chaos-mobile > *:nth-child(n+7) { display: none !important; }
    /* Flow: 3 vertikale Step-Karten mit sichtbaren Connectoren */
    .lp-hero-flow {
      margin-top: 0 !important;
      height: auto !important;
      flex-direction: column !important;
      gap: 0 !important;
      padding: 2px 0 !important;
      max-width: 100% !important;
      justify-self: stretch !important;
      text-align: center !important;
    }
    /* Connectoren = ungerade div-Kinder (Positionen 3, 5) */
    .lp-hero-flow > div:nth-child(odd) {
      display: flex !important;
      justify-content: center !important;
      padding: 0 !important;
      height: 10px !important;
    }
    .lp-hero-flow > div:nth-child(odd) > div {
      height: 10px !important;
      width: 1px !important;
      background: rgba(255,255,255,0.15) !important;
    }
    /* Cards = gerade div-Kinder (Positionen 2, 4, 6) */
    .lp-hero-flow > div:nth-child(even) {
      padding: 10px 14px !important;
      border-radius: 10px !important;
      justify-content: center !important;
      background: rgba(255,255,255,0.04) !important;
    }
    .lp-hero-flow > div:nth-child(even) > div:not(:first-child) { display: none !important; }
    /* Pulsierender Accent-Punkt auf der dritten Card (Live-Status) */
    .lp-hero-flow > div:nth-child(6) .lp-flow-label::before {
      content: "";
      display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .lp-flow-label {
      font-size: 13px !important;
      line-height: 1.3 !important;
      text-align: center !important;
      white-space: nowrap !important;
    }
    .lp-flow-sub { display: none !important; }
    /* Metrics: kompakte 3-Spalten-Reihe ohne Trennlinien */
    .lp-hero-metrics {
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 8px !important;
      padding-top: 14px !important;
      margin-top: 14px !important;
    }
    .lp-hero-metrics > div {
      width: auto !important;
      max-width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      text-align: center !important;
      padding: 0 !important;
      border-bottom: 0 !important;
    }
    .lp-hero-metrics > div > div:first-child {
      margin-bottom: 4px !important;
      font-size: 9px !important;
      letter-spacing: 0.06em !important;
      line-height: 1.2 !important;
    }
    .lp-hero-metrics > div > div:last-child {
      margin-top: 0 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 5px !important;
      font-size: 12px !important;
      flex-wrap: nowrap !important;
      white-space: nowrap !important;
    }
    .lp-hero-metrics > div > div:last-child svg { width: 9px !important; height: 9px !important; }
    .lp-hero-metrics > div > div:last-child > span:last-child {
      font-weight: 600 !important;
    }

    /* ===== Generic grids ===== */
    .lp-2col-sm { grid-template-columns: 1fr !important; gap: 24px !important; }
    .lp-3col-sm { grid-template-columns: 1fr !important; }
    .lp-4col-sm { grid-template-columns: 1fr 1fr !important; }
    .lp-6col-sm { grid-template-columns: 1fr !important; }
    .lp-3col-md { grid-template-columns: 1fr !important; }

    /* Sticky disable on mobile */
    .lp-not-sticky-sm { position: static !important; }

    /* ===== Problem ===== */
    .lp-problem-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    .lp-problem-card {
      grid-template-columns: 44px 1fr !important;
      gap: 16px !important;
      padding: 20px !important;
      border-radius: 14px !important;
    }
    .lp-problem-card > div:nth-child(4) { display: none !important; }

    /* ===== Solution flow ===== */
    .lp-flow-grid { grid-template-columns: 1fr !important; gap: 14px !important; }

    /* ===== Benefits ===== */
    .lp-benefits-grid {
      grid-template-columns: 1fr 1fr !important;
      border-radius: 16px !important;
      gap: 1px !important;
    }
    .lp-benefit-card { min-height: 0 !important; padding: 22px 18px !important; gap: 14px !important; }
    .lp-benefit-kpi { font-size: 22px !important; }

    /* ===== Trust steps ===== */
    .lp-trust-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    .lp-trust-line-bg { display: none !important; }

    /* ===== Services ===== */
    #leistungen { padding-bottom: 44px !important; }
    .lp-services-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    .lp-service-card { padding: 24px 20px !important; border-radius: 14px !important; }

    /* ===== Scenarios ===== */
    .lp-scen-grid { grid-template-columns: 1fr !important; gap: 12px !important; }

    /* ===== CTA ===== */
    .lp-services-cta { margin-top: 24px !important; }
    .lp-services-cta a { width: 100% !important; max-width: 360px !important; }
    .lp-cta-block {
      padding: 40px 24px !important;
      grid-template-columns: 1fr !important;
      gap: 32px !important;
      border-radius: 16px !important;
    }

    /* ===== Solution / SystemHub ===== */
    .lp-systemhub {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
      padding: 28px 22px !important;
      border-radius: 16px !important;
    }
    .lp-systemhub > div:last-child svg { max-width: 280px !important; }
    .lp-solution-pillars { grid-template-columns: 1fr !important; }

    /* ===== Benefits savings strip ===== */
    .lp-savings-strip {
      grid-template-columns: 1fr !important;
      gap: 20px !important;
      padding: 28px 22px !important;
      border-radius: 16px !important;
    }
    .lp-savings-strip > div { border-left: 0 !important; padding-left: 0 !important; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px; }
    .lp-savings-strip > div:first-child { border-top: 0 !important; padding-top: 0 !important; }

    /* ===== Trust mini-flow icon rows wrap ===== */
    .lp-scen-mini { flex-wrap: wrap !important; }

    /* ===== Team section ===== */
    .lp-team-head { grid-template-columns: 1fr !important; gap: 24px !important; align-items: flex-start !important; }
    .lp-team-labels { grid-template-columns: 1fr !important; gap: 8px !important; padding: 0 16px 20px !important; }
    .lp-team-decor { display: none !important; }
    .lp-team-name-card { padding: 12px 16px !important; }

    /* ===== Footer ===== */
    .lp-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; padding-bottom: 32px !important; }
    .lp-footer-brand { grid-column: span 2 !important; }
    .lp-footer-bottom { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }

    /* ===== Logos strip ===== */
    .lp-logos-wrap { padding: 26px 20px !important; }
    .lp-logos-title {
      gap: 10px !important;
      line-height: 1.35 !important;
      margin-bottom: 20px !important;
      max-width: 300px !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
    .lp-logos-title-line { width: 18px !important; flex-shrink: 0 !important; }
    .lp-logos-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 12px !important; row-gap: 14px !important; }
    .lp-logo-item {
      width: 100% !important;
      justify-content: flex-start !important;
      gap: 6px !important;
      min-height: 34px !important;
      padding: 0 8px !important;
    }
    .lp-logo-item > span:first-child { flex: 0 0 10px !important; }
    .lp-logo-item > span:last-child { font-size: 13px !important; line-height: 1.15 !important; white-space: normal !important; }

    /* Tap targets */
    a, button { -webkit-tap-highlight-color: transparent; }
  }

  /* === Very small (≤ 380px) === */
  @media (max-width: 380px) {
    .lp-section { padding-top: 60px !important; padding-bottom: 60px !important; }
    .lp-4col-sm { grid-template-columns: 1fr !important; }
    .lp-benefits-grid { grid-template-columns: 1fr !important; }
    .lp-hero-h1 { font-size: 38px !important; }
    .lp-section-h2 { font-size: 30px !important; }
    .lp-logos-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .lp-logos-title-line { display: none !important; }
    .lp-problem-card { padding: 18px !important; }
    .lp-benefit-card { padding: 20px 16px !important; }
  }
</style>
</head>
